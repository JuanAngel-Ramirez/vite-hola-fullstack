version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Esto buscará dónde está el package.json e instalará ahí
        - find . -name "package.json" -execdir npm install \;
    build:
      commands:
        # Esto buscará dónde está el script de build y lo ejecutará
        - find . -name "package.json" -execdir npm run build \;
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - '**/node_modules/**/*'