version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            # Entramos a Interfaz, que es como se llama en tu GitHub
            - cd Interfaz && npm install
        build:
          commands:
            - cd Interfaz && npm run build
      artifacts:
        baseDirectory: Interfaz/dist
        files:
          - '**/*'
      cache:
        paths:
          - Interfaz/node_modules/**/*
    appRoot: Interfaz