version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Entramos a Interfaz, NO a frontend
        - cd Interfaz && npm install
    build:
      commands:
        - cd Interfaz && npm run build
  artifacts:
    baseDirectory: Interfaz/dist
    files:
      - '**/*'
  cache:
    paths:
      - Interfaz/node_modules/**/*